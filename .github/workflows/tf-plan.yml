name: Terraform Plan

on:
  workflow_call:
    inputs:
      projects:
        description: "JSON array of project execution payloads"
        required: true
        type: string
      pr-number:
        description: "Pull request number"
        required: true
        type: string
      head-sha:
        description: "Head commit SHA to check out and key artifacts against"
        required: true
        type: string
      commenter:
        description: "GitHub username who triggered the plan (for lock attribution)"
        required: true
        type: string
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  statuses: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(inputs.projects) }}
      fail-fast: false

    steps:
      - name: Check out repository at PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head-sha }}

      - name: Set up Terraform ${{ matrix.project.terraform_version }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.project.terraform_version }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.project.role_arn }}
          aws-region: ${{ matrix.project.aws_region }}

      - name: Acquire project lock
        id: lock-acquire
        env:
          PROJECT_NAME: ${{ matrix.project.name }}
          PR_NUMBER: ${{ inputs.pr-number }}
          HEAD_SHA: ${{ inputs.head-sha }}
          COMMENTER: ${{ inputs.commenter }}
          BACKEND_BUCKET: ${{ matrix.project.backend_bucket }}
        run: |
          set -e
          LOCK_KEY="locks/${PROJECT_NAME}.lock"
          LOCK_FILE="/tmp/tf-lock.json"
          NEW_LOCK_FILE="/tmp/tf-new-lock.json"

          cat > "$NEW_LOCK_FILE" <<EOF
          {
            "pr_number": ${PR_NUMBER},
            "head_sha": "${HEAD_SHA}",
            "locked_by": "${COMMENTER}",
            "locked_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repo": "${GITHUB_REPOSITORY}"
          }
          EOF

          if aws s3api get-object \
              --bucket "$BACKEND_BUCKET" \
              --key "$LOCK_KEY" \
              "$LOCK_FILE" 2>/dev/null; then
            EXISTING_PR=$(jq -r '.pr_number' "$LOCK_FILE")
            if [ "$EXISTING_PR" = "$PR_NUMBER" ]; then
              echo "Lock already owned by this PR. Re-plan allowed."
              exit 0
            fi
            # Blocked by another PR
            {
              echo "LOCK_BLOCKED=true"
              echo "LOCK_PR=$(jq -r '.pr_number' "$LOCK_FILE")"
              echo "LOCK_BY=$(jq -r '.locked_by' "$LOCK_FILE")"
              echo "LOCK_AT=$(jq -r '.locked_at' "$LOCK_FILE")"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          # No existing lock — acquire with conditional write (avoids race condition)
          if ! aws s3api put-object \
              --bucket "$BACKEND_BUCKET" \
              --key "$LOCK_KEY" \
              --body "$NEW_LOCK_FILE" \
              --if-none-match "*" 2>/dev/null; then
            # Race condition: another plan acquired simultaneously — re-read and report blocked
            aws s3api get-object --bucket "$BACKEND_BUCKET" --key "$LOCK_KEY" "$LOCK_FILE" 2>/dev/null || true
            {
              echo "LOCK_BLOCKED=true"
              echo "LOCK_PR=$(jq -r '.pr_number' "$LOCK_FILE" 2>/dev/null || echo unknown)"
              echo "LOCK_BY=$(jq -r '.locked_by' "$LOCK_FILE" 2>/dev/null || echo unknown)"
              echo "LOCK_AT=$(jq -r '.locked_at' "$LOCK_FILE" 2>/dev/null || echo unknown)"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Lock acquired for PR #${PR_NUMBER} on project ${PROJECT_NAME}."

      - name: Post lock-blocked comment
        if: env.LOCK_BLOCKED == 'true'
        env:
          PROJECT_NAME: ${{ matrix.project.name }}
          PR_NUMBER: ${{ inputs.pr-number }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const name = process.env.PROJECT_NAME
            const lockPr = process.env.LOCK_PR
            const lockBy = process.env.LOCK_BY
            const lockAt = process.env.LOCK_AT
            const prNumber = parseInt(process.env.PR_NUMBER, 10)

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body:
                `🔒 **Project \`${name}\` is locked by PR #${lockPr}** (@${lockBy}, since ${lockAt}).\n\n` +
                `Run \`/tf unlock\` in this PR to steal the lock if that PR is abandoned.`,
            })

      - name: Terraform init
        if: env.LOCK_BLOCKED != 'true'
        working-directory: ${{ matrix.project.dir }}
        env:
          BACKEND_BUCKET: ${{ matrix.project.backend_bucket }}
          BACKEND_KEY: ${{ matrix.project.backend_key }}
          BACKEND_REGION: ${{ matrix.project.backend_region }}
          BACKEND_DYNAMO: ${{ matrix.project.backend_dynamodb_table }}
        run: |
          BACKEND_ARGS="-backend-config=bucket=$BACKEND_BUCKET \
            -backend-config=key=$BACKEND_KEY \
            -backend-config=region=$BACKEND_REGION"
          if [ -n "$BACKEND_DYNAMO" ]; then
            BACKEND_ARGS="$BACKEND_ARGS -backend-config=dynamodb_table=$BACKEND_DYNAMO"
          fi
          terraform init $BACKEND_ARGS -reconfigure

      - name: Select Terraform workspace
        if: env.LOCK_BLOCKED != 'true'
        working-directory: ${{ matrix.project.dir }}
        run: |
          terraform workspace select "${{ matrix.project.workspace }}" || \
          terraform workspace new "${{ matrix.project.workspace }}"

      - name: Terraform plan
        id: plan
        if: env.LOCK_BLOCKED != 'true'
        working-directory: ${{ matrix.project.dir }}
        run: |
          set +e
          terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Upload plan artifact
        id: upload
        if: env.LOCK_BLOCKED != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          # Artifact name includes PR number + head SHA to prevent stale plan consumption
          name: tfplan-${{ matrix.project.name }}-${{ inputs.pr-number }}-${{
            inputs.head-sha }}
          path: |
            ${{ matrix.project.dir }}/tfplan
            ${{ matrix.project.dir }}/plan-output.txt
          retention-days: 7

      - name: Set pending apply-required status
        if: success() && env.LOCK_BLOCKED != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state: 'pending',
              context: 'terraform/apply-required',
              description: 'Terraform plan succeeded — apply required before merge',
            })

      - name: Post plan result comment
        if: env.LOCK_BLOCKED != 'true' && always()
        env:
          PROJECT_NAME: ${{ matrix.project.name }}
          PROJECT_DIR: ${{ matrix.project.dir }}
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit-code }}
          PR_NUMBER: ${{ inputs.pr-number }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const dir = process.env.PROJECT_DIR
            const planOutput = fs.existsSync(`${dir}/plan-output.txt`)
              ? fs.readFileSync(`${dir}/plan-output.txt`, 'utf8')
              : '(no plan output found)'
            const success = process.env.PLAN_EXIT_CODE === '0'
            const icon = success ? '✅' : '❌'
            const status = success ? 'succeeded' : 'failed'
            const name = process.env.PROJECT_NAME
            const artifactId = process.env.ARTIFACT_ID
            const artifactLine = artifactId ? `\n<!-- tfplan-artifact-id:${artifactId} -->` : ''
            const body = [
              `${icon} **Terraform Plan \`${name}\`** ${status}${artifactLine}`,
              '',
              '<details><summary>Plan Output</summary>',
              '',
              '```',
              planOutput.slice(0, 60000),
              '```',
              '',
              '</details>',
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body,
            })
