name: Terraform Apply

on:
  workflow_call:
    inputs:
      projects:
        description: 'JSON array of project execution payloads'
        required: true
        type: string
      pr-number:
        description: 'Pull request number'
        required: true
        type: string
      head-sha:
        description: 'Head commit SHA â€” must match the plan artifact SHA'
        required: true
        type: string
      commenter:
        description: 'GitHub username who triggered the apply'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  statuses: write
  actions: read

jobs:
  apply:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(inputs.projects) }}
      fail-fast: false

    steps:
      - name: Check out repository at PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head-sha }}

      - name: Set up Terraform ${{ matrix.project.terraform_version }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.project.terraform_version }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.project.role_arn }}
          aws-region: ${{ matrix.project.aws_region }}

      - name: Download plan artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: tfplan-${{ matrix.project.name }}-${{ inputs.pr-number }}-${{ inputs.head-sha }}
          PROJECT_NAME: ${{ matrix.project.name }}
          DEST_DIR: ${{ matrix.project.dir }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process')
            const fs = require('fs')

            const destDir = process.env.DEST_DIR
            const prNumber = parseInt(process.env.PR_NUMBER, 10)
            const repo = process.env.REPO
            const projectName = process.env.PROJECT_NAME

            // Search PR comments for the artifact ID left by the plan step
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            // Find the most recent plan comment that has an artifact ID for this project
            const artifactComment = [...comments].reverse().find(c =>
              c.body.includes(`**Terraform Plan \`${projectName}\`**`) &&
              c.body.includes('<!-- tfplan-artifact-id:')
            )

            if (!artifactComment) {
              core.setFailed(`No plan artifact ID found in PR comments for project "${projectName}". Run /tf plan first.`)
              return
            }

            const match = artifactComment.body.match(/<!-- tfplan-artifact-id:(\d+) -->/)
            if (!match) {
              core.setFailed(`Could not parse artifact ID from plan comment. Run /tf plan again.`)
              return
            }

            const artifactId = match[1]
            core.info(`Found artifact ID: ${artifactId}`)

            execSync(
              `gh api repos/${repo}/actions/artifacts/${artifactId}/zip > /tmp/tfplan.zip`,
              { shell: true, env: { ...process.env } }
            )
            execSync(`unzip -o /tmp/tfplan.zip -d "${destDir}"`, { shell: true })
      - name: Terraform init
        working-directory: ${{ matrix.project.dir }}
        env:
          BACKEND_BUCKET: ${{ matrix.project.backend_bucket }}
          BACKEND_KEY: ${{ matrix.project.backend_key }}
          BACKEND_REGION: ${{ matrix.project.backend_region }}
          BACKEND_DYNAMO: ${{ matrix.project.backend_dynamodb_table }}
        run: |
          BACKEND_ARGS="-backend-config=bucket=$BACKEND_BUCKET \
            -backend-config=key=$BACKEND_KEY \
            -backend-config=region=$BACKEND_REGION"
          if [ -n "$BACKEND_DYNAMO" ]; then
            BACKEND_ARGS="$BACKEND_ARGS -backend-config=dynamodb_table=$BACKEND_DYNAMO"
          fi
          terraform init $BACKEND_ARGS -reconfigure

      - name: Select Terraform workspace
        working-directory: ${{ matrix.project.dir }}
        run: |
          terraform workspace select "${{ matrix.project.workspace }}" || \
          terraform workspace new "${{ matrix.project.workspace }}"

      - name: Terraform apply
        id: apply
        working-directory: ${{ matrix.project.dir }}
        run: |
          set +e
          terraform apply -no-color -auto-approve tfplan 2>&1 | tee apply-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Post apply result comment
        if: always()
        env:
          PROJECT_NAME: ${{ matrix.project.name }}
          PROJECT_DIR: ${{ matrix.project.dir }}
          APPLY_EXIT_CODE: ${{ steps.apply.outputs.exit-code }}
          PR_NUMBER: ${{ inputs.pr-number }}
          COMMENTER: ${{ inputs.commenter }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const dir = process.env.PROJECT_DIR
            const applyOutput = fs.existsSync(`${dir}/apply-output.txt`)
              ? fs.readFileSync(`${dir}/apply-output.txt`, 'utf8')
              : '(no apply output found)'
            const success = process.env.APPLY_EXIT_CODE === '0'
            const icon = success ? 'âś…' : 'âťŚ'
            const status = success ? 'succeeded' : 'failed'
            const name = process.env.PROJECT_NAME
            const body = [
              `${icon} **Terraform Apply \`${name}\`** ${status} (triggered by @${process.env.COMMENTER})`,
              '',
              '<details><summary>Apply Output</summary>',
              '',
              '```',
              applyOutput.slice(0, 60000),
              '```',
              '',
              '</details>',
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body,
            })

  merge:
    needs: apply
    runs-on: ubuntu-latest
    # Only merge when every apply matrix job succeeded
    if: needs.apply.result == 'success'

    steps:
      - name: Post merge notice comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr-number }},
              body: 'âś… **All Terraform applies succeeded.** This PR will now be automatically merged and the source branch will be deleted.',
            })

      - name: Set apply-required status to success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state: 'success',
              context: 'terraform/apply-required',
              description: 'Terraform apply succeeded',
            })

      - name: Check merge policy
        id: merge-policy
        env:
          PROJECTS_JSON: ${{ inputs.projects }}
        uses: actions/github-script@v7
        with:
          script: |
            const projects = JSON.parse(process.env.PROJECTS_JSON)
            const requireMerge = projects.every(p => p.require_merge_after_apply !== false)
            core.setOutput('required', requireMerge ? 'true' : 'false')

      - name: Merge pull request
        if: steps.merge-policy.outputs.required == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: ${{ inputs.pr-number }},
                merge_method: 'squash',
              })
            } catch (err) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ inputs.pr-number }},
                body: `âš ď¸Ź **Terraform apply succeeded but auto-merge failed**: ${err.message}\n\nPlease merge this PR manually.`,
              })
              core.setFailed(err.message)
            }

      - name: Delete source branch
        if: steps.merge-policy.outputs.required == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: ${{ inputs.pr-number }},
              })
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${pr.data.head.ref}`,
              })
            } catch (err) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ inputs.pr-number }},
                body: `âš ď¸Ź **PR merged but branch deletion failed**: ${err.message}\n\nPlease delete the branch manually.`,
              })
              core.setFailed(err.message)
            }
