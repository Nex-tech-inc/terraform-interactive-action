name: Terraform Apply Status Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write

jobs:
  set-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Set terraform/apply-required to pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'terraform/apply-required',
              description: 'Waiting for /tf apply to succeed before merge is allowed',
            })
