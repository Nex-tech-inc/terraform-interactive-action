name: Terraform Apply Status Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write
  contents: read

jobs:
  set-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set terraform/apply-required status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const hasTerraformConfig = fs.existsSync('.terraform-deployment')
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: hasTerraformConfig ? 'pending' : 'success',
              context: 'terraform/apply-required',
              description: hasTerraformConfig
                ? 'Waiting for /tf apply to succeed before merge is allowed'
                : 'No Terraform config found — gate not required',
            })
