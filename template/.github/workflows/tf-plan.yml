name: Terraform Plan

on:
  workflow_call:
    inputs:
      projects:
        description: 'JSON array of project execution payloads'
        required: true
        type: string
      pr-number:
        description: 'Pull request number'
        required: true
        type: string
      head-sha:
        description: 'Head commit SHA to check out and key artifacts against'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  statuses: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(inputs.projects) }}
      fail-fast: false

    steps:
      - name: Check out repository at PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head-sha }}

      - name: Set up Terraform ${{ matrix.project.terraform_version }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.project.terraform_version }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.project.role_arn }}
          aws-region: ${{ matrix.project.aws_region }}

      - name: Terraform init
        working-directory: ${{ matrix.project.dir }}
        env:
          BACKEND_BUCKET: ${{ matrix.project.backend_bucket }}
          BACKEND_KEY: ${{ matrix.project.backend_key }}
          BACKEND_REGION: ${{ matrix.project.backend_region }}
          BACKEND_DYNAMO: ${{ matrix.project.backend_dynamodb_table }}
        run: |
          BACKEND_ARGS="-backend-config=bucket=$BACKEND_BUCKET \
            -backend-config=key=$BACKEND_KEY \
            -backend-config=region=$BACKEND_REGION"
          if [ -n "$BACKEND_DYNAMO" ]; then
            BACKEND_ARGS="$BACKEND_ARGS -backend-config=dynamodb_table=$BACKEND_DYNAMO"
          fi
          terraform init $BACKEND_ARGS -reconfigure

      - name: Select Terraform workspace
        working-directory: ${{ matrix.project.dir }}
        env:
          TF_WORKSPACE: ${{ matrix.project.workspace }}
        run: terraform workspace select -or-create "$TF_WORKSPACE"

      - name: Terraform plan
        id: plan
        working-directory: ${{ matrix.project.dir }}
        run: |
          set +e
          terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit-code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Artifact name includes PR number + head SHA to prevent stale plan consumption
          name: tfplan-${{ matrix.project.name }}-${{ inputs.pr-number }}-${{ inputs.head-sha }}
          path: |
            ${{ matrix.project.dir }}/tfplan
            ${{ matrix.project.dir }}/plan-output.txt
          retention-days: 7

      - name: Set pending apply-required status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state: 'pending',
              context: 'terraform/apply-required',
              description: 'Terraform plan succeeded — apply required before merge',
            })

      - name: Post plan result comment
        if: always()
        env:
          PROJECT_NAME: ${{ matrix.project.name }}
          PROJECT_DIR: ${{ matrix.project.dir }}
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit-code }}
          PR_NUMBER: ${{ inputs.pr-number }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const dir = process.env.PROJECT_DIR
            const planOutput = fs.existsSync(`${dir}/plan-output.txt`)
              ? fs.readFileSync(`${dir}/plan-output.txt`, 'utf8')
              : '(no plan output found)'
            const success = process.env.PLAN_EXIT_CODE === '0'
            const icon = success ? '✅' : '❌'
            const status = success ? 'succeeded' : 'failed'
            const name = process.env.PROJECT_NAME
            const body = [
              `${icon} **Terraform Plan \`${name}\`** ${status}`,
              '',
              '<details><summary>Plan Output</summary>',
              '',
              '```',
              planOutput.slice(0, 60000),
              '```',
              '',
              '</details>',
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body,
            })
